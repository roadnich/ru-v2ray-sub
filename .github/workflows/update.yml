YAML
name: update_ru_sub

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: install python
        run: pip install requests

      - name: run filter
        run: python filter.py

      - name: commit file
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add ru.txt
          git commit -m "update ru list" || exit 0
          git push
