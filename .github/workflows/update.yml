name: update_ru

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Скачиваем репозиторий
      - uses: actions/checkout@v3

      # Настройка Python через Anaconda
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Устанавливаем requests
      - name: Install requests
        run: pip install requests

      # Запускаем скрипт фильтра RU серверов
      - name: Run filter script
        run: python filter.py

      # Показать содержимое (для проверки)
      - name: Show files
        run: ls -la

      # Закоммитить ru.txt и отправить обратно в репозиторий
      - name: Commit ru.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ru.txt
          git commit -m "update ru list" || echo "no changes"
          git push
