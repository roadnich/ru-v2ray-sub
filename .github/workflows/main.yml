name: Update RU configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download source file
        run: curl -L -o source.txt "https://raw.githubusercontent.com/Hidashimora/free-vpn-anti-rkn/main/configs/1.1.txt"

      - name: Filter RU lines
        run: grep "RU-" source.txt > ru-configs.txt || true

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ru-configs.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update RU configs"
          git push
