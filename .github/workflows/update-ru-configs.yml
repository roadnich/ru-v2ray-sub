name: Update RU V2Ray Configs

on:
  schedule:
    # Запуск каждый день в 00:00 UTC
    - cron: '0 5 5 * * *'
  # Возможность ручного запуска
  workflow_dispatch:
  # Запуск при изменениях в файле подписки
  repository_dispatch:
    types: [subscription_updated]

# Разрешения для записи в репозиторий
permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Download subscription
        run: |
          curl -o subscription.txt "https://raw.githubusercontent.com/Hidashimora/free-vpn-anti-rkn/main/configs/1.1.txt"
      
      - name: Filter RU configurations
        run: |
          python3 -c "
          import re
          
          ru_configs = []
          with open('subscription.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  # Пропускаем комментарии и пустые строки
                  if not line or line.startswith('#'):
                      continue
                  
                  # Проверяем, содержит ли строка RU метку
                  # RU может быть в виде флага или текста
                  if re.search(r'RU[-\d]*\)?', line) or 'россия' in line.lower() or 'russia' in line.lower() or 'рф' in line.lower():
                      ru_configs.append(line)
                  # Проверка по emoji флага РФ 🇷🇺
                  elif '\U0001F1F7\U0001F1FA' in line:  # 🇷🇺
                      ru_configs.append(line)
          
          with open('ru_configs.txt', 'w') as f:
              f.write('# RU V2Ray Configs\n')
              f.write(f'# Updated: $(date -u)\n')
              f.write(f'# Total: {len(ru_configs)} configs\n\n')
              for config in ru_configs:
                  f.write(config + '\n')
          
          print(f'Found {len(ru_configs)} RU configurations')
          "
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Добавляем файл с конфигурациями
          git add ru_configs.txt
          
          # Коммитим только если есть изменения
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update RU configs $(date -u +'%Y-%m-%d')"
          
          # Пушим изменения
          git push
